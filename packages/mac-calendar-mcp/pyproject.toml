[project]
name = "mac-calendar-mcp"
version = "0.5.12"
description = "Read-only Mac Calendar MCP server with indexed archive search."
readme = "README.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.11"
authors = [
    { name = "Ioan-Mihail Dinu", email = "iodinu@icloud.com" },
]
keywords = [
    "apple-calendar",
    "mac-calendar-mcp",
    "calendar",
    "jxa",
    "macos",
    "mcp",
    "model-context-protocol",
    "search",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: MacOS X",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: MacOS",
    "Programming Language :: JavaScript",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Scheduling",
]
dependencies = [
    "authlib>=1.6.11",
    "cryptography>=46.0.7",
    "fastmcp>=3.2.0,<4",
    "idna>=3.15",
    "pyjwt>=2.12.0",
    "python-dotenv>=1.2.2",
    "python-multipart>=0.0.27",
    "requests>=2.33.0",
    "starlette>=1.0.1",
    "urllib3>=2.7.0",
    "cyclopts>=4.10",
]

[project.urls]
Homepage = "https://github.com/wagamama/apple-app-mcp"
Documentation = "https://wagamama.github.io/apple-app-mcp/"
Repository = "https://github.com/wagamama/apple-app-mcp"
Issues = "https://github.com/wagamama/apple-app-mcp/issues"
Changelog = "https://github.com/wagamama/apple-app-mcp/blob/main/CHANGELOG.md"

[project.scripts]
mac-calendar-mcp = "apple_calendar_mcp:main"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=0.24",
    "ruff>=0.14.8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/apple_calendar_mcp"]

[tool.hatch.build.targets.sdist]
include = ["src/", "tests/"]

[tool.hatch.build]
artifacts = ["src/**/*.js", "src/**/py.typed"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
