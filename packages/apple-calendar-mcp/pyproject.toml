[project]
name = "apple-calendar-mcp"
version = "0.1.0"
description = "Read-only Apple Calendar MCP server with indexed archive search."
readme = "../../CALENDAR.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.11"
authors = [
    { name = "Ioan-Mihail Dinu", email = "iodinu@icloud.com" },
]
keywords = [
    "apple-calendar",
    "calendar",
    "jxa",
    "macos",
    "mcp",
    "model-context-protocol",
    "search",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: MacOS X",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: MacOS",
    "Programming Language :: JavaScript",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Scheduling",
]
dependencies = [
    "fastmcp>=3.0.0b1,<4",
    "cyclopts>=4.10",
]

[project.scripts]
apple-calendar-mcp = "apple_calendar_mcp:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.14.8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/apple_calendar_mcp"]

[tool.hatch.build.targets.sdist]
include = ["src/", "tests/"]

[tool.hatch.build]
artifacts = ["src/**/*.js", "src/**/py.typed"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
