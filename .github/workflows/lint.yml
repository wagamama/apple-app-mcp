name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node 24 ahead of the June 2026 forced cutover. Quiets the
# deprecation warning that surfaces on every Actions run today and keeps
# us compatible after Node 20 is removed from runners (Sept 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
      - run: uv sync --group dev
      - run: uv run ruff check packages/apple-mail-mcp/src packages/apple-calendar-mcp/src
      - run: uv run ruff format --check packages/apple-mail-mcp/src packages/apple-calendar-mcp/src
