name: Release

on:
  push:
    tags: ["v*"]

# Opt into Node 24 ahead of the June 2026 forced cutover. Same rationale
# as lint.yml — keeps release runs free of the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - mac-mail-mcp
          - mac-calendar-mcp
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
      - run: uv build --package ${{ matrix.package }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-${{ matrix.package }}
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1, supports Metadata-Version 2.4

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release delete "$GITHUB_REF_NAME" --yes --cleanup-tag=false
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME — Apple App MCP" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-creatordate | sed -n '2p')" \
            || gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME — Apple App MCP" \
              --generate-notes

  mcp-registry:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install mcp-publisher
        run: |
          MCP_PUBLISHER_VERSION="v1.7.9"
          MCP_PUBLISHER_SHA256="ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac"
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            -o mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
      - name: Authenticate to MCP Registry via GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish Mail to MCP Registry
        run: ./mcp-publisher publish server.mail.json
      - name: Publish Calendar to MCP Registry
        run: ./mcp-publisher publish server.calendar.json
